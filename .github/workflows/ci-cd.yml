name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Backend Tests
  backend-tests:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: berves_hrms_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, dom, filter, gd, hash, json, pcre, session, simplexml, spl, tokenizer, zip, redis, imagick
        tools: composer:v2

    - name: Copy environment file
      run: cp berves-backend/.env.example berves-backend/.env
      working-directory: ./berves-backend

    - name: Install dependencies
      run: composer install --no-progress --no-interaction --prefer-dist --optimize-autoloader
      working-directory: ./berves-backend

    - name: Set up environment
      run: |
        php -r "file_exists('.env') || copy('.env.example', '.env');"
        sed -i 's/DB_HOST=127.0.0.1/DB_HOST=mysql/g' .env
        sed -i 's/DB_DATABASE=berves_hrms/DB_DATABASE=berves_hrms_test/g' .env
        sed -i 's/DB_USERNAME=root/DB_USERNAME=root/g' .env
        sed -i 's/DB_PASSWORD=/DB_PASSWORD=root/g' .env
        sed -i 's/REDIS_HOST=127.0.0.1/REDIS_HOST=redis/g' .env
        sed -i 's/CACHE_DRIVER=file/CACHE_DRIVER=redis/g' .env
        sed -i 's/SESSION_DRIVER=file/SESSION_DRIVER=redis/g' .env
        sed -i 's/QUEUE_CONNECTION=database/QUEUE_CONNECTION=redis/g' .env
        php artisan key:generate
      working-directory: ./berves-backend

    - name: Run migrations
      run: php artisan migrate --force
      working-directory: ./berves-backend
      env:
        DB_HOST: mysql
        DB_DATABASE: berves_hrms_test
        DB_USERNAME: root
        DB_PASSWORD: root

    - name: Seed database
      run: php artisan db:seed --force
      working-directory: ./berves-backend
      env:
        DB_HOST: mysql
        DB_DATABASE: berves_hrms_test
        DB_USERNAME: root
        DB_PASSWORD: root

    - name: Run tests
      run: php artisan test --coverage
      working-directory: ./berves-backend

    - name: Run Pint (Code Style)
      run: ./vendor/bin/pint --test
      working-directory: ./berves-backend

  # Frontend Tests
  frontend-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: berves-frontend/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: ./berves-frontend

    - name: Run tests
      run: npm run test:coverage
      working-directory: ./berves-frontend

    - name: Build application
      run: npm run build
      working-directory: ./berves-frontend

  # Security Scanning
  security-scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'

    - name: Install dependencies
      run: composer install --no-progress --no-interaction --prefer-dist
      working-directory: ./berves-backend

    - name: Run security audit
      run: composer audit
      working-directory: ./berves-backend

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm ci
      working-directory: ./berves-frontend

    - name: Run security audit
      run: npm audit --audit-level=moderate
      working-directory: ./berves-frontend

  # Docker Build and Push (only on main branch)
  docker-build:
    needs: [backend-tests, frontend-tests, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: ./berves-backend
        file: ./berves-backend/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/berves-hrms-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/berves-hrms-backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./berves-frontend
        file: ./berves-frontend/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/berves-hrms-frontend:latest
          ${{ secrets.DOCKER_USERNAME }}/berves-hrms-frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Deploy to Production (only on main branch)
  deploy-production:
    needs: [docker-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.PROD_HOST }}
        username: ${{ secrets.PROD_USER }}
        key: ${{ secrets.PROD_SSH_KEY }}
        script: |
          cd /var/www/berves-hrms
          docker-compose pull
          docker-compose up -d
          docker system prune -f

    - name: Run post-deployment health check
      run: |
        sleep 30
        curl -f ${{ secrets.PROD_URL }}/health || exit 1
